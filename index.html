<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Home Screen -->
  <div id="home" class="screen show">
    <h1>Welcome to My Homepage</h1>
    <div class="menu">
      <button data-section="about">About Me</button>
      <button data-section="essay">Essay</button>
      <button data-section="portfolio">Portfolio</button>
    </div>
  </div>

  <!-- About Me -->
  <div id="about" class="screen">
    <h2>About Me</h2>
    <p>This is where you describe yourself.</p>
    <button class="back">Back to Home</button>
  </div>

  <!-- Essay -->
  <div id="essay" class="screen">
    <h2>Essay</h2>
    <p>This is where your essay will appear.</p>
    <button class="back">Back to Home</button>
  </div>

  <!-- Portfolio -->
  <div id="portfolio" class="screen">
    <h2>Portfolio</h2>
    <p>This is where your portfolio projects will be displayed.</p>
    <button class="back">Back to Home</button>
  </div>

  <script>
    const buttons = document.querySelectorAll('.menu button');
    const backButtons = document.querySelectorAll('.back');
    const screens = document.querySelectorAll('.screen');

    // Show selected section
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.getAttribute('data-section');
        document.getElementById('home').classList.remove('show');
        document.getElementById('home').classList.add('hide');
        setTimeout(() => {
          document.getElementById(section).classList.add('show');
        }, 400);
      });
    });

    // Back to home
    backButtons.forEach(back => {
      back.addEventListener('click', () => {
        screens.forEach(screen => screen.classList.remove('show'));
        setTimeout(() => {
          document.getElementById('home').classList.remove('hide');
          document.getElementById('home').classList.add('show');
        }, 400);
      });
    });
  </script>
</body>
</html>
